<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>खाते नोंदणी</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #2c5364);
}

.container {
  width: 420px;
  margin: 40px auto;
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 { text-align: center; }

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.qr {
  text-align: center;
  margin: 10px 0;
}

.qr img {
  width: 180px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #007bff;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<div class="container">
<h2>सभासद-खाते नोंदणी</h2>

<form id="form">

<input name="name" placeholder="सभासद पूर्ण नाव" required>
<input name="mobile" placeholder="मोबाइल नंबर" required>
<input name="email" placeholder="ईमेल" required>
<input name="aadhaar" placeholder="आधार नंबर" required>
<input name="pan" placeholder="पॅन नंबर" required>

<input name="nominee" placeholder="वारसदारचे नाव" required>

<select name="account">
  <option>सभासद</option>
  <option>सेविंग अकाऊंट</option>
  <option>करंट अकाऊंट</option>
  <option>पिग्मि</option>
</select>

<select name="paymentMode">
  <option>कॅश</option>
  <option>ऑनलाइन/UPI</option>
</select>

<!-- ✅ QR CODE -->
<div class="qr">
  <p>Scan & Pay</p>
  <img src="images/QR.jpg" alt="QR Code">
</div>

<!-- ✅ OPTIONAL TRANSACTION ID -->
<input name="transactionId" placeholder="ट्रानजॅकशन आयडी (UTR) - optional">

<label>आधार अपलोड</label>
<input type="file" id="aadhaarFile" required>

<label>पॅन अपलोड</label>
<input type="file" id="panFile" required>

<label>पासपोर्ट फोटो</label>
<input type="file" id="photoFile" required>

<label>सहीचा नमूना</label>
<input type="file" id="signatureFile" required>

<label>वारसदार अधिकृत डॉक्युमेंट</label>
<input type="file" id="nomineeDoc" required>

<button type="submit" id="submitBtn">Submit</button>

</form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzPfIKc-mSVKTg8u4hnKJ2HT-Kel_iX-QFHdmwyygE_u5SgmpXae14uXpVyTXlOCN_E/exec";

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");

  // ✅ Prevent multiple clicks
  btn.disabled = true;
  btn.innerText = "Submitting... ⏳";

  try {
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    // Convert files
    data.aadhaarFile = await toBase64(document.getElementById("aadhaarFile").files[0]);
    data.panFile = await toBase64(document.getElementById("panFile").files[0]);
    data.photoFile = await toBase64(document.getElementById("photoFile").files[0]);
    data.signatureFile = await toBase64(document.getElementById("signatureFile").files[0]);
    data.nomineeDoc = await toBase64(document.getElementById("nomineeDoc").files[0]);

    await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    alert("Submitted Successfully ✅");
    document.getElementById("form").reset();

  } catch (error) {
    console.error(error);
    alert("Error ❌");
  }

  btn.disabled = false;
  btn.innerText = "Submit";
});

function toBase64(file) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve(""); // ✅ optional safe handling

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}
</script>

</body>
</html>
